name: deploy-backend

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      TF_VAR_backend_image_identifier: ${{ secrets.BACKEND_IMAGE_IDENTIFIER }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_github_repository: ${{ secrets.GITHUB_REPOSITORY_URL }}
      TF_VAR_github_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          cd infra/terraform
          terraform init

      - name: Resolve deployment targets
        id: tf
        run: |
          cd infra/terraform
          echo "ecr_repo=$(terraform output -raw backend_ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "service_arn=$(terraform output -raw backend_service_arn)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: image
        env:
          ECR_REPOSITORY: ${{ steps.tf.outputs.ecr_repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REPOSITORY}:${IMAGE_TAG}"
          cd backend
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Update App Runner service image
        env:
          SERVICE_ARN: ${{ steps.tf.outputs.service_arn }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          CONFIG_JSON=$(aws apprunner describe-service --service-arn "${SERVICE_ARN}" --query 'Service.SourceConfiguration' --output json)
          NEW_CONFIG=$(echo "${CONFIG_JSON}" | jq --arg image "${IMAGE_URI}" '.ImageRepository.ImageIdentifier = $image')
          aws apprunner update-service --service-arn "${SERVICE_ARN}" --source-configuration "${NEW_CONFIG}"
