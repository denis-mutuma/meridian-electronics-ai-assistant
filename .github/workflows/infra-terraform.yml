name: infra-terraform

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Set to true to run terraform apply"
        required: true
        default: "false"

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_backend_image_identifier: ${{ secrets.BACKEND_IMAGE_IDENTIFIER }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_github_repository: ${{ secrets.GITHUB_REPOSITORY_URL }}
      TF_VAR_github_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: cd infra/terraform && terraform fmt -check

      - name: Terraform init
        run: cd infra/terraform && terraform init

      - name: Terraform validate
        run: cd infra/terraform && terraform validate

      - name: Terraform plan
        run: cd infra/terraform && terraform plan -out tfplan

      - name: Terraform apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: cd infra/terraform && terraform apply -auto-approve tfplan
