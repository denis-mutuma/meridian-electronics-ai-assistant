# deploy.yml — runs only when commits land on the main branch.
#
# What it does:
#   1. Runs backend tests and frontend build (gate before any AWS work).
#   2. Builds and pushes the backend Docker image to Amazon ECR.
#   3. Registers a new ECS task definition revision with the new image only
#      (secrets, environment keys, and Secrets Manager references are preserved).
#   4. Updates the ECS Fargate service and waits for it to stabilise.
#   5. AWS Amplify picks up the main-branch push automatically via its
#      GitHub webhook — no extra step is needed here.
#
# Secrets (OPENAI_API_KEY, JWT_SECRET) should be supplied to tasks via the ECS
# task definition `secrets` block pointing at Secrets Manager ARNs (see README).
# Optional GitHub secret OPENAI_API_KEY is no longer written into the task by
# this workflow.
#
# Repository-level variables (Settings → Variables — not secrets):
#   AWS_ROLE_ARN        (default: arn:aws:iam::673786334778:role/meridian-electronics-github-actions)
#   AWS_REGION          (default: us-east-1)
#   ECR_REPO_NAME       (default: meridian-electronics-ai-assistant-dev-backend)
#   ECS_CLUSTER_NAME    (default: meridian-assistant-cluster)
#   ECS_SERVICE_NAME    (default: meridian-assistant-backend-svc)
#   ECS_TASK_FAMILY     (default: meridian-assistant-backend)
#   ECS_CONTAINER_NAME  (default: backend)
#   ALLOWED_ORIGINS     (optional) Comma-separated CORS origins for the backend,
#                       e.g. Terraform output amplify_origin_https. When set,
#                       the deploy job updates that env var on the target container.

name: deploy

on:
  push:
    branches: [main]

# OIDC token is required for keyless AWS authentication.
permissions:
  id-token: write
  contents: read

env:
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || 'arn:aws:iam::673786334778:role/meridian-electronics-github-actions' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPO_NAME: ${{ vars.ECR_REPO_NAME || 'meridian-electronics-ai-assistant-dev-backend' }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME || 'meridian-assistant-cluster' }}
  ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME || 'meridian-assistant-backend-svc' }}
  ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY || 'meridian-assistant-backend' }}
  ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME || 'backend' }}

jobs:
  # ── Gate: tests must pass before any AWS work begins ──────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run backend tests
        run: |
          cd backend
          uv sync
          uv run pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (compilation check)
        run: |
          cd frontend
          npm ci
          npm run build

  # ── Deploy: build image → push to ECR → update ECS Fargate service ────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Authenticate to AWS using OIDC — no long-lived access keys needed.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Derive the full ECR repository URL from the AWS account ID.
      - name: Resolve ECR repository URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REPO_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_NAME}"
          echo "repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"

      # Log in to ECR so Docker can push.
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build and tag the image with the commit SHA for traceability.
      - name: Build and push backend Docker image
        id: image
        env:
          REPO_URL: ${{ steps.ecr.outputs.repo_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REPO_URL}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" backend/
          docker push "${IMAGE_URI}"
          # Also tag as :latest for convenience.
          docker tag "${IMAGE_URI}" "${REPO_URL}:latest"
          docker push "${REPO_URL}:latest"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      # Pull the current task definition, swap only the container image, then register a
      # new revision. Preserves secrets[], environment, CPU, memory, roles, etc.
      - name: Register new ECS task definition revision
        id: taskdef
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: |
          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_FAMILY}" \
            --query taskDefinition \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF_JSON" | jq \
            --arg IMAGE_URI "$IMAGE_URI" \
            --arg CONTAINER "${ECS_CONTAINER_NAME}" \
            --arg ALLOWED_ORIGINS "${ALLOWED_ORIGINS:-}" \
            '
              .containerDefinitions |= map(
                if .name == $CONTAINER then
                  .image = $IMAGE_URI
                  | if ($ALLOWED_ORIGINS | length) > 0 then
                      .environment = ((.environment // []) | map(select(.name != "ALLOWED_ORIGINS")) + [{"name":"ALLOWED_ORIGINS","value":$ALLOWED_ORIGINS}])
                    else .
                    end
                else .
                end
              )
              | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
            ')

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_definition_arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"

      # Point the ECS service to the new task definition revision.
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${ECS_SERVICE_NAME}" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}" \
            --force-new-deployment

      # Block until all tasks in the service are healthy and running the new revision.
      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_SERVICE_NAME}"
