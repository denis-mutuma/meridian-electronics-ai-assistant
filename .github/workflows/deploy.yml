# deploy.yml — runs only when commits land on the main branch.
#
# What it does:
#   1. Runs backend tests and frontend static build (gate before any AWS work).
#   2. Builds and pushes the backend Docker image to Amazon ECR; updates ECS.
#   3. Syncs the static Next.js export (out/) to S3 and invalidates CloudFront.
#
# ECS should load OPENAI_API_KEY from Secrets Manager (see README). Optional
# GitHub variable ALLOWED_ORIGINS should match your CloudFront URL for CORS.
#
# Frontend deploy needs these names under Actions → Variables **or** Secrets (same keys):
#   NEXT_PUBLIC_API_BASE_URL, FRONTEND_S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID
# Optional Variables (defaults in env block): AWS_ROLE_ARN, AWS_REGION, ECR_*, ECS_*, CONTAINER_NAME
# ALLOWED_ORIGINS (optional Variable): terraform output frontend_origin_https

name: deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || 'arn:aws:iam::673786334778:role/meridian-electronics-github-actions' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPO_NAME: ${{ vars.ECR_REPO_NAME || 'meridian-electronics-ai-assistant-dev-backend' }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME || 'meridian-assistant-cluster' }}
  ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME || 'meridian-assistant-backend-svc' }}
  ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY || 'meridian-assistant-backend' }}
  ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME || 'backend' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run backend tests
        run: |
          cd backend
          uv sync
          uv run pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (static export)
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8000' }}
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repository URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REPO_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_NAME}"
          echo "repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend Docker image
        id: image
        env:
          REPO_URL: ${{ steps.ecr.outputs.repo_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REPO_URL}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" backend/
          docker push "${IMAGE_URI}"
          docker tag "${IMAGE_URI}" "${REPO_URL}:latest"
          docker push "${REPO_URL}:latest"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Register new ECS task definition revision
        id: taskdef
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: |
          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_FAMILY}" \
            --query taskDefinition \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF_JSON" | jq \
            --arg IMAGE_URI "$IMAGE_URI" \
            --arg CONTAINER "${ECS_CONTAINER_NAME}" \
            --arg ALLOWED_ORIGINS "${ALLOWED_ORIGINS:-}" \
            '
              .containerDefinitions |= map(
                if .name == $CONTAINER then
                  .image = $IMAGE_URI
                  | if ($ALLOWED_ORIGINS | length) > 0 then
                      .environment = ((.environment // []) | map(select(.name != "ALLOWED_ORIGINS")) + [{"name":"ALLOWED_ORIGINS","value":$ALLOWED_ORIGINS}])
                    else .
                    end
                else .
                end
              )
              | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
            ')

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_definition_arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${ECS_SERVICE_NAME}" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}" \
            --force-new-deployment

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${ECS_SERVICE_NAME}"

  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    env:
      # Prefer Variables; fall back to Secrets (many repos store these under Secrets by mistake).
      FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET || secrets.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID || secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || secrets.NEXT_PUBLIC_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Check configuration for frontend deploy
        run: |
          set -e
          MISSING=""
          [ -z "${FRONTEND_S3_BUCKET:-}" ] && MISSING="$MISSING FRONTEND_S3_BUCKET"
          [ -z "${CLOUDFRONT_DISTRIBUTION_ID:-}" ] && MISSING="$MISSING CLOUDFRONT_DISTRIBUTION_ID"
          [ -z "${NEXT_PUBLIC_API_BASE_URL:-}" ] && MISSING="$MISSING NEXT_PUBLIC_API_BASE_URL"
          if [ -n "$MISSING" ]; then
            echo "::error::Set these under Settings → Secrets and variables → Actions (Variables **or** Secrets — same names):$MISSING"
            exit 1
          fi
          echo "Frontend deploy configuration OK."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/out "s3://${FRONTEND_S3_BUCKET}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
