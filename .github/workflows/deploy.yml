name: deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run backend tests
        run: |
          cd backend
          uv sync
          uv run pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (static export)
        run: |
          cd frontend
          npm ci
          npm run build

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || 'arn:aws:iam::673786334778:role/meridian-electronics-github-actions' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve backend deploy settings
        env:
          V_FUNCTION_NAME: ${{ vars.BACKEND_LAMBDA_FUNCTION_NAME }}
          S_FUNCTION_NAME: ${{ secrets.BACKEND_LAMBDA_FUNCTION_NAME }}
        run: |
          set -e
          FUNCTION_NAME="${V_FUNCTION_NAME:-$S_FUNCTION_NAME}"
          if [ -z "$FUNCTION_NAME" ]; then
            echo "::error::Define BACKEND_LAMBDA_FUNCTION_NAME from the Terraform output lambda_function_name."
            exit 1
          fi
          echo "BACKEND_LAMBDA_FUNCTION_NAME=$FUNCTION_NAME" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build Lambda package
        run: bash scripts/build_lambda_package.sh

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${BACKEND_LAMBDA_FUNCTION_NAME}" \
            --zip-file "fileb://build/backend-lambda.zip"

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name "${BACKEND_LAMBDA_FUNCTION_NAME}"

  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || 'arn:aws:iam::673786334778:role/meridian-electronics-github-actions' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve frontend deploy settings
        env:
          V_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
          S_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
          V_DIST: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          S_DIST: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -e
          BUCKET="${V_BUCKET:-$S_BUCKET}"
          DIST="${V_DIST:-$S_DIST}"
          MISSING=""
          [ -z "$BUCKET" ] && MISSING="$MISSING FRONTEND_S3_BUCKET"
          [ -z "$DIST" ] && MISSING="$MISSING CLOUDFRONT_DISTRIBUTION_ID"
          if [ -n "$MISSING" ]; then
            echo "::error::Define these on GitHub Environment dev (or repo Actions Variables/Secrets), exact names:$MISSING"
            exit 1
          fi
          echo "FRONTEND_S3_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_DISTRIBUTION_ID=$DIST" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/out "s3://${FRONTEND_S3_BUCKET}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
