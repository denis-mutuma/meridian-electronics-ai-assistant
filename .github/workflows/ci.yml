name: ci

on:
  pull_request:
  push:
    branches: [main, feat/mvp-chatbot]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Run backend tests
        run: |
           # ci.yml — runs on every pull request and on pushes to non-main branches.
           # Purpose: validate that backend tests pass and the frontend compiles.
           # No AWS credentials are required here.
 
           name: ci
 
           on:
             pull_request:
             push:
               branches-ignore: [main]
 
           jobs:
             # ── Backend: run pytest via uv ──────────────────────────────────────────────
             backend-tests:
               runs-on: ubuntu-latest
               steps:
                 - uses: actions/checkout@v4
 
                 - uses: actions/setup-python@v5
                   with:
                     python-version: "3.12"
 
                 - name: Install uv
                   run: pip install uv
 
                 - name: Install dependencies and run tests
                   run: |
                     cd backend
                     uv sync
                     uv run pytest -q
 
             # ── Frontend: ensure Next.js compiles without errors ────────────────────────
             frontend-build:
               runs-on: ubuntu-latest
               steps:
                 - uses: actions/checkout@v4
 
                 - uses: actions/setup-node@v4
                   with:
                     node-version: "20"
 
                 - name: Install dependencies and build
                   run: |
                     cd frontend
                     npm ci
                     npm run build
